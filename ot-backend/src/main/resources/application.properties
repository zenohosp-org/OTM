spring.application.name=ot-server
server.port=${PORT:8085}

# Database Configuration (Shared zenohosp database across all services)
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USER:postgres.qmfupslqooexhshomnhw}
spring.datasource.password=${DB_PASS:Javatech@2026}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:jhhuhjkhfu8374rwqloiqipaz8cuy39mjnncbvbbzma289eh3u}

# SSO Cookie Configuration
sso.cookie.name=${SSO_COOKIE_NAME:sso_token}
sso.cookie.domain=${SSO_COOKIE_DOMAIN:zenohosp.com}
sso.cookie.secure=${SSO_COOKIE_SECURE:true}
sso.cookie.max-age=${SSO_COOKIE_MAX_AGE:86400}

# OAuth2 Configuration (Directory Backend)
spring.security.oauth2.client.registration.directory.client-id=${OAUTH2_CLIENT_ID:ot-manager-client}
spring.security.oauth2.client.registration.directory.client-secret=${OAUTH2_CLIENT_SECRET:ot-manager-secret-key-2026}
spring.security.oauth2.client.registration.directory.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.directory.redirect-uri=https://api-ot.zenohosp.com/login/oauth2/code/directory
spring.security.oauth2.client.provider.directory.authorization-uri=${DIRECTORY_AUTH_URL:https://api-directory.zenohosp.com/oauth2/authorize}
spring.security.oauth2.client.provider.directory.token-uri=${DIRECTORY_TOKEN_URL:https://api-directory.zenohosp.com/oauth2/token}
spring.security.oauth2.client.provider.directory.user-info-uri=${DIRECTORY_USER_INFO_URL:https://api-directory.zenohosp.com/api/user/me}

# Inter-service URLs
hms.api.url=${HMS_API_URL:https://api-hms.zenohosp.com}
inventory.api.url=${INVENTORY_API_URL:https://api-inventory.zenohosp.com}
billing.api.url=${BILLING_API_URL:https://api-hms.zenohosp.com}
